<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reformer Viborg Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
    }

    #chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      background: #bda696;
      color: white;
      font-size: 34px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      z-index: 9999;
    }

    #chat-container {
      position: fixed;
      bottom: 110px;
      right: 20px;
      width: 420px;
      height: 700px;
      background: #f7f7f7;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.25);
      display: none;
      flex-direction: column;
      z-index: 9999;
    }

    #chat-header {
      background: #bda696;
      color: white;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: white;
    }

    .header-title {
      font-size: 26px;
      font-weight: bold;
    }

    .header-buttons {
      display: flex;
      gap: 16px;
      font-size: 28px;
      cursor: pointer;
    }

    #chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #f5f5f5;
    }

    .message {
      display: flex;
      margin-bottom: 18px;
      align-items: flex-end;
    }

    .bot-message {
      justify-content: flex-start;
    }

    .user-message {
      justify-content: flex-end;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .bubble {
      max-width: 75%;
      padding: 16px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 20px;
    }

    .bot-message .bubble {
      background: #ebe7e2;
      color: #333;
    }

    .user-message .bubble {
      background: #bda696;
      color: white;
    }

    #chat-input-area {
      padding: 16px;
      background: white;
      border-top: 1px solid #ddd;
    }

    #chat-input-wrapper {
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px;
    }

    #chat-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 18px;
      padding: 10px;
    }

    #send-btn {
      background: none;
      border: none;
      color: #bda696;
      font-size: 30px;
      cursor: pointer;
    }

    #chat-footer {
      text-align: center;
      padding: 12px;
      font-size: 15px;
      background: white;
    }

    #chat-footer a {
      color: #bda696;
      text-decoration: none;
      font-weight: bold;
    }

    @media(max-width: 500px) {
      #chat-container {
        width: 100%;
        height: 100%;
        right: 0;
        bottom: 0;
        border-radius: 0;
      }

      #chat-toggle {
        right: 15px;
        bottom: 15px;
      }
    }
  </style>
</head>

<body>

<button id="chat-toggle">⌄</button>

<div id="chat-container">

  <div id="chat-header">
    <div class="header-left">
      <img src="https://i.imgur.com/nWde3co.png">
      <div class="header-title">Reformer Viborg</div>
    </div>

    <div class="header-buttons">
      <span onclick="restartChat()">↻</span>
      <span onclick="toggleChat()">✕</span>
    </div>
  </div>

  <div id="chat-messages">
    <div class="message bot-message">
      <img class="avatar" src="https://i.imgur.com/nWde3co.png">
      <div class="bubble">
        Hej 👋 Hvordan kan jeg hjælpe dig?
      </div>
    </div>
  </div>

  <div id="chat-input-area">
    <div id="chat-input-wrapper">
      <input type="text" id="chat-input" placeholder="Skriv dit spørgsmål..." />
      <button id="send-btn">➤</button>
    </div>
  </div>

  <div id="chat-footer">
    Built by
    <a href="https://nordaiagency.dk" target="_blank">
      NordAI Agency
    </a>
  </div>

</div>

<script>
  const toggleBtn = document.getElementById('chat-toggle');
  const chatContainer = document.getElementById('chat-container');
  const sendBtn = document.getElementById('send-btn');
  const input = document.getElementById('chat-input');
  const messages = document.getElementById('chat-messages');

  const API_URL = "http://178.104.51.5:3000/api/v1/prediction/YOUR_FLOW_ID";

  function toggleChat() {
    if (chatContainer.style.display === 'flex') {
      chatContainer.style.display = 'none';
    } else {
      chatContainer.style.display = 'flex';
    }
  }

  toggleBtn.onclick = toggleChat;

  function addMessage(text, sender) {
    const msg = document.createElement('div');
    msg.classList.add('message', sender + '-message');

    if(sender === 'bot') {
      msg.innerHTML = `
        <img class="avatar" src="https://i.imgur.com/nWde3co.png">
        <div class="bubble">${text}</div>
      `;
    } else {
      msg.innerHTML = `
        <div class="bubble">${text}</div>
      `;
    }

    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();

    if(!text) return;

    addMessage(text, 'user');

    input.value = '';

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          question: text
        })
      });

      const data = await response.json();

      addMessage(data.text || "Intet svar modtaget.", 'bot');

    } catch (err) {
      addMessage("Forbindelsesfejl til chatbot.", 'bot');
    }
  }

  sendBtn.onclick = sendMessage;

  input.addEventListener('keypress', function(e) {
    if(e.key === 'Enter') {
      sendMessage();
    }
  });

  function restartChat() {
    messages.innerHTML = `
      <div class="message bot-message">
        <img class="avatar" src="https://i.imgur.com/nWde3co.png">
        <div class="bubble">
          Hej 👋 Hvordan kan jeg hjælpe dig?
        </div>
      </div>
    `;
  }
</script>

</body>
</html>
